<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>notedrop</title>
<meta name="description" content="An ocean-blue page. Drop a note. It files itself.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2308192b'/><circle cx='50' cy='50' r='14' fill='%2334c3f0'/></svg>">
<style>
  :root {
    --bg: #08192b;
    --bg-soft: #0e2439;
    --line: #1d3b56;
    --ink: #e6f2fb;
    --ink-dim: #86b0d0;
    --ink-faint: #47698c;
    --accent: #34c3f0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  .app { display: flex; flex-direction: column; height: 100dvh;
    max-width: 760px; margin: 0 auto; position: relative;
    border-left: 1px solid var(--line); border-right: 1px solid var(--line); }

  /* ---------- screens ---------- */
  .screen { flex: 1; min-height: 0; display: none; flex-direction: column; }
  .screen.on { display: flex; }
  .lhead { display: flex; align-items: center; gap: .7rem;
    padding: 1rem 1.3rem .8rem; border-bottom: 1px solid var(--line); flex: none; }
  .lhead .back { font-size: 1.4rem; line-height: 1; color: var(--ink-dim); padding: 0 .2rem; display: none; }
  .lhead .back.on { display: block; }
  .lhead h2 { margin: 0; flex: 1; font-size: .98rem; color: var(--ink); font-weight: 600; }
  .lhead .n { font-size: .72rem; color: var(--ink-faint); }

  /* ---------- categories (Lists) screen ---------- */
  .cats-body { flex: 1; min-height: 0; overflow-y: auto; padding: .9rem 1rem 1.4rem;
    display: flex; flex-direction: column; }
  .catfilter {
    width: 100%; background: var(--bg-soft); border: 1px solid var(--line); color: var(--ink);
    border-radius: 10px; padding: .55rem .7rem; font: inherit; font-size: .9rem; outline: none;
    margin-bottom: .8rem; flex: none;
  }
  .catfilter:focus { border-color: var(--accent); }
  .catfilter::placeholder { color: var(--ink-faint); }
  .catlist { display: flex; flex-direction: column; gap: 5px; }
  .catlist .nomatch { color: var(--ink-faint); font-size: .84rem; padding: .8rem .3rem; }
  .cat {
    display: flex; align-items: center; gap: .6rem; width: 100%;
    padding: .8rem .85rem; border-radius: 12px; color: var(--ink); background: var(--bg-soft);
    font-size: .96rem; text-align: left;
  }
  .cat:active { background: var(--line); }
  .cat .emoji { font-size: 1.1rem; flex: none; }
  .cat .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat .count { font-size: .78rem; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .cat .menu-btn { font-size: 1.05rem; color: var(--ink-faint); padding: 0 .3rem; flex: none; }
  .cat .menu-btn:hover { color: var(--ink-dim); }
  .cat input.rename {
    flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    border-radius: 6px; padding: .2rem .4rem; font: inherit; font-size: .95rem; min-width: 0;
  }

  /* ---------- home / drop screen ---------- */
  .drop-screen { align-items: center; justify-content: center; padding: 2rem 1.4rem; }
  .drop-inner { width: min(560px, 100%); }
  .drop-inner .tagline { text-align: center; color: var(--ink-faint); font-size: .72rem;
    letter-spacing: .2em; text-transform: uppercase; margin: 0 0 1.6rem;
    display: flex; align-items: center; justify-content: center; gap: .45rem; }
  .drop-inner form { position: relative; }
  .drop-inner input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
    color: var(--ink); font-size: 1.5rem; padding: .6rem .2rem .8rem; text-align: center;
    outline: none; caret-color: var(--accent);
  }
  .drop-inner input::placeholder { color: var(--ink-faint); }
  .drop-inner input:focus { border-bottom-color: var(--accent); }
  .drop-inner .hint { display: block; text-align: center; margin-top: .9rem;
    font-size: .68rem; color: var(--ink-faint); }
  .gear { position: absolute; top: .9rem; right: 1rem; font-size: 1.15rem;
    color: var(--ink-faint); padding: .2rem .35rem; }
  .gear:hover { color: var(--ink-dim); }

  /* ---------- notes list ---------- */
  .items { flex: 1; overflow-y: auto; padding: .4rem 1.3rem 1.4rem; }
  .items-inner { display: flex; flex-direction: column; }
  .item {
    display: flex; align-items: center; gap: .7rem; padding: .8rem .1rem;
    border-bottom: 1px solid var(--line);
  }
  .item .check {
    width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--ink-faint);
    flex: none; display: grid; place-items: center; transition: all .15s;
  }
  .item .check:active { border-color: var(--accent); }
  .item.done .check { background: var(--accent); border-color: var(--accent); }
  .item.done .check::after { content: "✓"; font-size: .72rem; color: #041018; }
  .item .emoji { flex: none; font-size: 1.1rem; }
  .item .text { flex: 1; font-size: .98rem; overflow-wrap: anywhere; }
  .item.done .text { color: var(--ink-faint); text-decoration: line-through; }
  .item .tag { font-size: .68rem; color: var(--ink-faint); border: 1px solid var(--line);
    border-radius: 999px; padding: .12rem .55rem; white-space: nowrap; cursor: pointer; flex: none; }
  .item .tag:active { color: var(--ink-dim); border-color: var(--ink-faint); }
  .item .del { color: var(--ink-faint); font-size: 1.25rem; padding: 0 .3rem; flex: none; }
  .item .del:active { color: #e0748a; }
  .empty { color: var(--ink-faint); font-size: .9rem; text-align: center; padding: 3rem 1rem; }

  /* ---------- bottom nav ---------- */
  .bottomnav { display: flex; border-top: 1px solid var(--line); background: var(--bg);
    padding-bottom: env(safe-area-inset-bottom); flex: none; }
  .bottomnav button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .18rem;
    padding: .55rem 0 .6rem; color: var(--ink-faint); font-size: .6rem; letter-spacing: .1em;
    text-transform: uppercase; }
  .bottomnav button .ic { font-size: 1.3rem; line-height: 1; }
  .bottomnav button.active { color: var(--accent); }

  /* ---------- toast ---------- */
  #toast {
    position: fixed; bottom: 4.6rem; left: 50%; transform: translate(-50%, 8px);
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 10px;
    padding: .55rem .9rem; font-size: .8rem; color: var(--ink-dim);
    display: flex; align-items: center; gap: .6rem; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; max-width: 90vw; z-index: 50;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  #toast b { color: var(--ink); font-weight: 600; }
  #toast select {
    background: var(--bg); color: var(--ink-dim); border: 1px solid var(--line);
    border-radius: 6px; font-size: .74rem; padding: .15rem .3rem;
  }

  /* ---------- popover menu ---------- */
  #pop {
    position: fixed; background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: 10px; padding: .3rem; min-width: 170px; display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,.6); font-size: .85rem; z-index: 60;
  }
  #pop button, #pop select { display: block; width: 100%; text-align: left; padding: .45rem .6rem;
    border-radius: 7px; color: var(--ink-dim); }
  #pop button:hover { background: #12283c; color: var(--ink); }
  #pop .danger:hover { color: #c66; }
  #pop select { background: var(--bg); border: 1px solid var(--line); margin-top: .2rem;
    font-size: .78rem; }
  #pop .lbl { font-size: .66rem; color: var(--ink-faint); padding: .35rem .6rem 0; }

  /* ---------- settings modal ---------- */
  #settings {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
    place-items: center; z-index: 70; padding: 1rem;
  }
  #settings.open { display: grid; }
  #settings .box {
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 14px;
    padding: 1.4rem; width: min(420px, 100%);
  }
  #settings h3 { margin: 0 0 .3rem; font-size: .95rem; }
  #settings p { font-size: .76rem; color: var(--ink-dim); margin: .3rem 0 .9rem; }
  #settings input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); padding: .55rem .7rem; font-size: .82rem; outline: none;
  }
  #settings .row { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1rem; }
  #settings .row button { font-size: .8rem; padding: .45rem .9rem; border-radius: 8px;
    color: var(--ink-dim); }
  #settings .row .primary { background: var(--accent); color: #000; }

  /* ---------- mobile ---------- */
  @media (max-width: 760px) {
    .app { border-left: none; border-right: none; }
  }
</style>
</head>
<body>
<div class="app">
  <section class="screen drop-screen on" id="screen-drop">
    <button class="gear" id="open-settings" aria-label="settings">⚙</button>
    <div class="drop-inner">
      <p class="tagline"><span aria-hidden="true">🌊</span> notedrop</p>
      <form id="dropform" autocomplete="off">
        <input id="dropinput" type="text" placeholder="drop a note…" maxlength="300" autofocus>
        <span class="hint" id="drophint">enter to file</span>
      </form>
    </div>
  </section>

  <section class="screen list-screen" id="screen-list">
    <header class="lhead">
      <button class="back" id="listback" aria-label="back to lists">‹</button>
      <h2 id="viewtitle">All notes</h2>
      <span class="n" id="viewcount"></span>
    </header>
    <div class="items"><div class="items-inner" id="itemlist"></div></div>
  </section>

  <section class="screen cats-screen" id="screen-cats">
    <header class="lhead"><h2>Lists</h2><span class="n" id="catcount"></span></header>
    <div class="cats-body">
      <input class="catfilter" id="catfilter" type="text" placeholder="filter lists…" autocomplete="off">
      <nav class="catlist" id="catlist"></nav>
    </div>
  </section>

  <nav class="bottomnav" id="bottomnav">
    <button data-nav="drop" class="active"><span class="ic" aria-hidden="true">✏️</span>Drop</button>
    <button data-nav="all"><span class="ic" aria-hidden="true">🗒️</span>All</button>
    <button data-nav="cats"><span class="ic" aria-hidden="true">🗂️</span>Lists</button>
  </nav>
</div>

<div id="toast"></div>
<div id="pop"></div>

<div id="settings">
  <div class="box">
    <h3>Smart classification</h3>
    <p>Notes are auto-filed with a built-in classifier. Paste an Anthropic API key to use
       Claude for much smarter filing. The key is stored only in this browser.</p>
    <input id="apikey" type="password" placeholder="sk-ant-…">
    <div class="row">
      <button id="settings-close">close</button>
      <button id="settings-save" class="primary">save</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- state ---------- */
const LS = "notedrop.v1";
const uid = () => Math.random().toString(36).slice(2, 10);
const defaultState = () => ({
  cats: [{ id: "inbox", name: "Inbox" }],
  items: [],
  apiKey: "",
  learned: {},   // stem -> { "Category Name": count } — built from user corrections
});
let S = load();
let view = "all";        // "all" | catId  (which notes the list screen shows)
let screen = "drop";     // "drop" | "list" | "cats"
let catFilter = "";
let toastTimer = null;

function go(scr, v) {
  screen = scr;
  if (v !== undefined) view = v;
  render();
  if (scr === "drop") { const di = document.getElementById("dropinput"); if (di) di.focus(); }
}

function load() {
  try {
    const raw = localStorage.getItem(LS);
    if (raw) { const s = JSON.parse(raw); if (s.cats && s.items) { s.learned = s.learned || {}; return s; } }
  } catch (e) {}
  return defaultState();
}
function save() { localStorage.setItem(LS, JSON.stringify(S)); }

const catById = (id) => S.cats.find(c => c.id === id);
const catByName = (name) => S.cats.find(c => c.name.toLowerCase() === name.toLowerCase().trim());
function ensureCat(name) {
  let c = catByName(name);
  if (!c) { c = { id: uid(), name: name.trim() }; S.cats.push(c); }
  return c;
}
/* Dynamic categories: a category only exists while it holds notes.
   Once its last note leaves (re-filed or deleted), the category is removed.
   Inbox is permanent. Returns true if anything was pruned. */
function pruneEmptyCats() {
  const used = new Set(S.items.map(i => i.cat));
  const before = S.cats.length;
  S.cats = S.cats.filter(c => c.id === "inbox" || used.has(c.id));
  if (view !== "all" && !catById(view)) view = "all";
  return S.cats.length !== before;
}

/* ---------- classification ---------- */
/* Built-in dictionary. Single words are matched by stem ("oranges" → "orange");
   entries with spaces are matched as phrases. */
const LEXICON = {
  "Shopping": [
    // verbs / signals
    "buy","get","order","need","restock","grocery","groceries","shopping","supermarket","market","store","amazon","comprar",
    // fruit
    "orange","apple","banana","grape","lemon","lime","mango","strawberry","blueberry","raspberry","peach","pear",
    "watermelon","melon","kiwi","pineapple","avocado","cherry","plum","fig","fruit",
    // vegetables
    "tomato","potato","onion","garlic","carrot","lettuce","spinach","broccoli","pepper","cucumber","zucchini",
    "courgette","mushroom","corn","cabbage","celery","vegetable",
    // staples & drinks
    "milk","bread","egg","butter","cheese","yogurt","rice","pasta","flour","sugar","salt","oil","cereal",
    "coffee","tea","juice","water bottle","beer","wine","chicken","beef","fish","salmon","ham","bacon","tuna","snack",
    // household goods
    "shampoo","soap","toothpaste","toothbrush","detergent","toilet paper","paper towel","batteries","battery",
    "bulb","sponge","razor","deodorant","napkin","trash bag","gift","present",
  ],
  "Work": [
    // dev / building things
    "repository","repo","build","deploy","deployment","code","coding","commit","push","merge","branch",
    "pull request","pr review","bug","fix the","feature","release","refactor","api","database","server",
    "website","app","frontend","backend","github","staging","production","test","launch",
    // office / business
    "meeting","meet with","deadline","report","client","project","boss","colleague","presentation","review",
    "invoice","slides","deck","standup","sprint","backlog","jira","notion","slack","proposal","contract",
    "pitch","demo","interview","cv","resume","linkedin","hire","hiring","onboarding","offsite","okr","kpi",
    // startup / vc flavor
    "investor","funding","fundraise","term sheet","cap table","startup","vc","due diligence","board","quarterly",
  ],
  "Calls & Messages": [
    "call","phone","text","message","email","reply","respond","contact","ring","whatsapp","telegram",
    "voicemail","follow up with","ligar","write to","answer",
  ],
  "Finance": [
    "pay","payment","bill","rent","tax","taxes","transfer","budget","subscription","cancel subscription",
    "insurance","mortgage","loan","invoice from","refund","salary","expense","receipt","iban","utilities",
  ],
  "Travel": [
    "flight","fly","hotel","airbnb","book","booking","trip","travel","pack","packing","passport","visa",
    "train","ticket","itinerary","airport","luggage","suitcase","check in","vacation","holiday","weekend in",
  ],
  "Ideas": [
    "idea","maybe","what if","could","concept","someday","brainstorm","blog","write about","research",
    "look into","explore","think about","read about","watch","listen to","podcast","book about",
  ],
  "Errands": [
    "pick up","drop off","post office","package","parcel","dry cleaning","pharmacy","renew","appointment",
    "dmv","license","registration","return","exchange","key copy","car wash","mechanic","haircut","barber",
  ],
  "Health": [
    "gym","doctor","dentist","run","running","workout","exercise","vitamins","sleep","meditate","stretch",
    "yoga","therapy","therapist","checkup","blood test","prescription","medication","swim","walk","hike","diet",
    "dentist appointment","doctor appointment","annual checkup",
  ],
  "Home": [
    "fix","clean","laundry","dishes","plants","water the","repair","trash","vacuum","garden","lightbulb",
    "paint","furniture","ikea","organize","declutter","closet","fridge","oven","leak","wifi router","curtains",
  ],
};

// crude stemmer: oranges→orange, batteries→battery, dishes→dish, meetings→meeting
function stem(w) {
  if (w.length > 4 && w.endsWith("ies")) return w.slice(0, -3) + "y";
  if (w.length > 4 && /(?:[sxz]|ch|sh)es$/.test(w)) return w.slice(0, -2);
  if (w.length > 3 && w.endsWith("s") && !w.endsWith("ss")) return w.slice(0, -1);
  return w;
}
const tokenize = (text) => text.toLowerCase().split(/[^a-zà-ÿ0-9]+/).filter(w => w.length > 2).map(stem);

// pre-index the lexicon: stemmed single words and phrase lists per category
const LEX_WORDS = {}, LEX_PHRASES = {};
for (const [name, keys] of Object.entries(LEXICON)) {
  LEX_WORDS[name] = new Set(); LEX_PHRASES[name] = [];
  for (const k of keys) {
    if (k.includes(" ")) LEX_PHRASES[name].push(k);
    else LEX_WORDS[name].add(stem(k));
  }
}

/* Learn from user corrections: these words belong to that category. */
function learn(text, catId) {
  const name = catById(catId)?.name; if (!name || catId === "inbox") return;
  for (const w of tokenize(text)) {
    S.learned[w] = S.learned[w] || {};
    S.learned[w][name] = (S.learned[w][name] || 0) + 1;
  }
  save();
}

function localClassify(text) {
  const t = " " + text.toLowerCase() + " ";
  const toks = tokenize(text);
  const scores = {}; // category name -> score
  const add = (name, n) => { scores[name] = (scores[name] || 0) + n; };

  // 0. explicit "idea …" prefix is a strong Ideas signal
  if (/^\s*ideas?\b/.test(text.toLowerCase())) add("Ideas", 5);
  // 1. learned corrections — strongest signal (personal vocabulary)
  for (const w of toks) {
    const m = S.learned[w];
    if (m) for (const [name, count] of Object.entries(m)) add(name, 4 * Math.min(count, 3));
  }
  // 2. built-in dictionary
  for (const name of Object.keys(LEXICON)) {
    for (const w of toks) if (LEX_WORDS[name].has(w)) add(name, 2);
    for (const p of LEX_PHRASES[name]) if (t.includes(p)) add(name, 3);
  }
  // 3. existing categories: name mention + word overlap with their items
  for (const c of S.cats) {
    if (c.id === "inbox") continue;
    if (t.includes(c.name.toLowerCase())) add(c.name, 3);
    const words = new Set(S.items.filter(i => i.cat === c.id).flatMap(i => tokenize(i.text)));
    for (const w of toks) if (words.has(w)) add(c.name, 1);
  }

  let best = null, bestScore = 0;
  for (const [name, s] of Object.entries(scores)) {
    if (s > bestScore) { bestScore = s; best = name; }
  }
  return bestScore >= 2 ? best : "Inbox";
}

async function aiClassify(text) {
  const existing = S.cats.map(c => c.name).filter(n => n !== "Inbox");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": S.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5",
      max_tokens: 256,
      output_config: {
        format: {
          type: "json_schema",
          schema: {
            type: "object",
            properties: { category: { type: "string" } },
            required: ["category"],
            additionalProperties: false,
          },
        },
      },
      messages: [{
        role: "user",
        content:
`You file short personal notes (todos, reminders, lists) into categories.

Existing categories: ${existing.length ? existing.join(", ") : "(none yet)"}

Note: "${text.replace(/"/g, "'")}"

Rules:
- Prefer an existing category when it fits.
- Otherwise invent ONE short, broad, reusable category name (1-2 words, Title Case).
- Never answer "Inbox" unless the note is truly unclassifiable.

Return the category name.`,
      }],
    }),
  });
  if (!res.ok) throw new Error("api " + res.status);
  const data = await res.json();
  if (data.stop_reason === "refusal") throw new Error("refusal");
  const block = (data.content || []).find(b => b.type === "text");
  const name = JSON.parse(block.text).category.trim();
  return name || "Inbox";
}

async function classify(text) {
  if (S.apiKey) {
    try { return await aiClassify(text); } catch (e) { /* fall through */ }
  }
  return localClassify(text);
}

/* ---------- emoji flair ----------
   Give notes a little color: a matching emoji when a keyword hits, otherwise
   the note's category emoji. Some notes get none — that's fine. */
const CAT_EMOJI = {
  "Shopping": "🛒", "Work": "💼", "Calls & Messages": "📞", "Finance": "💰",
  "Travel": "✈️", "Ideas": "💡", "Errands": "🚗", "Health": "🩺", "Home": "🏠",
};
const EMOJI_WORDS_RAW = {
  "🍊": ["orange","fruit"], "🍎": ["apple"], "🍌": ["banana"], "🍇": ["grape"],
  "🥛": ["milk"], "🍞": ["bread"], "🥚": ["egg"], "🧀": ["cheese"], "☕": ["coffee"],
  "🍵": ["tea"], "🍷": ["wine"], "🍺": ["beer"], "💧": ["water"], "🍗": ["chicken"],
  "🐟": ["fish","salmon","tuna"], "🍚": ["rice"], "🍝": ["pasta"], "🥗": ["salad","lettuce"],
  "🎁": ["gift","present"], "🎂": ["cake","birthday"], "🎉": ["party"],
  "✈️": ["flight","fly"], "🏨": ["hotel"], "🚆": ["train"], "🎫": ["ticket"], "🧳": ["luggage","suitcase","pack"],
  "🚗": ["car","drive"], "⛽": ["gas","fuel"], "🅿️": ["parking"],
  "🏋️": ["gym","workout","exercise"], "🏃": ["run","running"], "🧘": ["yoga","meditate"],
  "🩺": ["doctor","checkup"], "🦷": ["dentist"], "💊": ["medication","pill","prescription","vitamins"],
  "📚": ["book","read"], "💡": ["idea"], "✉️": ["email"], "📞": ["call","phone"], "💬": ["text","message","whatsapp"],
  "📅": ["meeting","appointment","calendar"], "💰": ["money","salary","budget","pay"], "🧾": ["bill","tax","invoice","receipt"],
  "🏠": ["rent","home","house"], "🧹": ["clean","vacuum"], "🧺": ["laundry"], "🍽️": ["dishes"],
  "🪴": ["plant","plants","garden"], "😴": ["sleep","nap"], "🎵": ["music","song","playlist"],
  "🎬": ["movie","film","watch"], "🎮": ["game"], "💻": ["code","coding","website"], "🐛": ["bug"],
  "🐶": ["dog"], "🐱": ["cat"], "💇": ["haircut","barber"], "📦": ["package","parcel","delivery"],
};
const EMOJI_STEMMED = {};
for (const [emo, words] of Object.entries(EMOJI_WORDS_RAW))
  for (const w of words) EMOJI_STEMMED[stem(w)] = emo;

function pickEmoji(text, catName) {
  for (const w of tokenize(text)) if (EMOJI_STEMMED[w]) return EMOJI_STEMMED[w];
  return CAT_EMOJI[catName] || "";
}

/* ---------- actions ---------- */
async function addNote(text) {
  const item = { id: uid(), text, cat: "inbox", done: false, ts: Date.now() };
  S.items.unshift(item); save(); render();
  const hint = document.getElementById("drophint");
  hint.textContent = S.apiKey ? "thinking…" : "filing…";
  const name = await classify(text);
  const cat = ensureCat(name);
  item.cat = cat.id;
  item.emoji = pickEmoji(text, cat.name);
  save(); render();
  hint.textContent = "enter to file";
  toastFiled(item);
}

function toggleDone(id) {
  const it = S.items.find(i => i.id === id);
  if (it) { it.done = !it.done; save(); render(); }
}
function deleteItem(id) {
  S.items = S.items.filter(i => i.id !== id); pruneEmptyCats(); save(); render();
}
function moveItem(id, catId) {
  const it = S.items.find(i => i.id === id);
  if (it) { it.cat = catId; pruneEmptyCats(); save(); render(); }
}
function renameCat(id, name) {
  const c = catById(id);
  if (!c || !name.trim()) return;
  const clash = catByName(name);
  if (clash && clash.id !== id) { mergeCat(id, clash.id); return; }
  c.name = name.trim(); save(); render();
}
function mergeCat(fromId, intoId) {
  if (fromId === intoId) return;
  for (const it of S.items) if (it.cat === fromId) it.cat = intoId;
  S.cats = S.cats.filter(c => c.id !== fromId || c.id === "inbox");
  if (fromId !== "inbox") S.cats = S.cats.filter(c => c.id !== fromId);
  if (view === fromId) view = intoId;
  save(); render();
}
function deleteCat(id) {
  if (id === "inbox") return;
  for (const it of S.items) if (it.cat === id) it.cat = "inbox";
  S.cats = S.cats.filter(c => c.id !== id);
  if (view === id) view = "all";
  save(); render();
}

/* ---------- render ---------- */
const esc = (s) => s.replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));

function render() {
  // which screen is visible
  document.getElementById("screen-drop").classList.toggle("on", screen === "drop");
  document.getElementById("screen-list").classList.toggle("on", screen === "list");
  document.getElementById("screen-cats").classList.toggle("on", screen === "cats");
  const navActive = screen === "drop" ? "drop"
    : (screen === "list" && view === "all") ? "all" : "cats";
  for (const b of document.querySelectorAll("#bottomnav button"))
    b.classList.toggle("active", b.dataset.nav === navActive);

  const counts = {};
  for (const it of S.items) counts[it.cat] = (counts[it.cat] || 0) + (it.done ? 0 : 1);

  // categories (Lists) screen
  const q = catFilter.trim().toLowerCase();
  const shown = S.cats.filter(c => !q || c.name.toLowerCase().includes(q));
  document.getElementById("catlist").innerHTML = shown.length
    ? shown.map(c => {
        const menu = c.id === "inbox" ? "" : `<span class="menu-btn" data-menu="${c.id}">⋯</span>`;
        const emo = CAT_EMOJI[c.name] || "";
        return `<button class="cat" data-view="${c.id}">
          ${emo ? `<span class="emoji" aria-hidden="true">${emo}</span>` : ""}
          <span class="name">${esc(c.name)}</span>
          <span class="count">${counts[c.id] || ""}</span>${menu}
        </button>`;
      }).join("")
    : `<p class="nomatch">no lists match “${esc(catFilter)}”</p>`;
  document.getElementById("catcount").textContent = S.cats.length;

  // notes list screen
  document.getElementById("viewtitle").textContent =
    view === "all" ? "All notes" : (catById(view)?.name || "All notes");
  document.getElementById("listback").classList.toggle("on", view !== "all");
  const items = S.items
    .filter(i => view === "all" || i.cat === view)
    .sort((a, b) => (a.done - b.done) || (b.ts - a.ts));
  document.getElementById("viewcount").textContent =
    items.length ? `${items.filter(i => !i.done).length} open` : "";
  const il = document.getElementById("itemlist");
  il.innerHTML = items.length
    ? items.map(i => `
      <div class="item ${i.done ? "done" : ""}" data-id="${i.id}">
        <button class="check" data-act="toggle" aria-label="toggle done"></button>
        ${i.emoji ? `<span class="emoji" aria-hidden="true">${i.emoji}</span>` : ""}
        <span class="text">${esc(i.text)}</span>
        ${view === "all" ? `<button class="tag" data-act="viewcat">${esc(catById(i.cat)?.name || "?")}</button>` : ""}
        <button class="del" data-act="del" aria-label="delete">×</button>
      </div>`).join("")
    : `<p class="empty">${view === "all" ? "no notes yet — drop one from the home screen" : "empty"}</p>`;
}

/* ---------- toast ---------- */
function toastFiled(item) {
  const t = document.getElementById("toast");
  const opts = S.cats.map(c =>
    `<option value="${c.id}" ${c.id === item.cat ? "selected" : ""}>${esc(c.name)}</option>`).join("")
    + `<option value="__new__">+ new list…</option>`;
  t.innerHTML = `filed under <b>${esc(catById(item.cat)?.name || "?")}</b>
    <select aria-label="move to category">${opts}</select>`;
  t.querySelector("select").addEventListener("change", (e) => {
    let catId = e.target.value;
    if (catId === "__new__") {
      const name = prompt("New list name:");
      if (!name || !name.trim()) { e.target.value = item.cat; return; }
      catId = ensureCat(name).id;
    }
    moveItem(item.id, catId);
    learn(item.text, catId);   // remember: these words belong there
    hideToast();
  });
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() { document.getElementById("toast").classList.remove("show"); }

/* ---------- popover (category menu) ---------- */
function openMenu(catId, x, y) {
  const pop = document.getElementById("pop");
  const others = S.cats.filter(c => c.id !== catId);
  pop.innerHTML = `
    <button data-pop="rename">Rename</button>
    <div class="lbl">Merge into…</div>
    <select data-pop="merge">
      <option value="">choose category</option>
      ${others.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("")}
    </select>
    <button data-pop="delete" class="danger">Delete (items → Inbox)</button>`;
  pop.style.display = "block";
  pop.style.left = Math.min(x, innerWidth - 190) + "px";
  pop.style.top = Math.min(y, innerHeight - 160) + "px";
  pop.dataset.cat = catId;
}
function closeMenu() { document.getElementById("pop").style.display = "none"; }

function startRename(catId) {
  const btn = document.querySelector(`.cat[data-view="${catId}"]`);
  if (!btn) return;
  const c = catById(catId);
  btn.innerHTML = `<input class="rename" value="${esc(c.name)}">`;
  const inp = btn.querySelector("input");
  inp.focus(); inp.select();
  const commit = () => renameCat(catId, inp.value);
  inp.addEventListener("keydown", (e) => {
    if (e.key === "Enter") commit();
    if (e.key === "Escape") render();
    e.stopPropagation();
  });
  inp.addEventListener("blur", commit);
}

/* ---------- events ---------- */
document.getElementById("dropform").addEventListener("submit", (e) => {
  e.preventDefault();
  const inp = document.getElementById("dropinput");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  addNote(text);
});

document.getElementById("bottomnav").addEventListener("click", (e) => {
  const b = e.target.closest("[data-nav]"); if (!b) return;
  if (b.dataset.nav === "drop") go("drop");
  else if (b.dataset.nav === "all") go("list", "all");
  else if (b.dataset.nav === "cats") go("cats");
});
document.getElementById("listback").addEventListener("click", () => go("cats"));
document.getElementById("catfilter").addEventListener("input", (e) => { catFilter = e.target.value; render(); });

document.getElementById("catlist").addEventListener("click", (e) => {
  const menu = e.target.closest("[data-menu]");
  if (menu) { e.stopPropagation(); openMenu(menu.dataset.menu, e.clientX, e.clientY); return; }
  const btn = e.target.closest("[data-view]");
  if (btn) go("list", btn.dataset.view);
});
document.getElementById("catlist").addEventListener("dblclick", (e) => {
  const btn = e.target.closest("[data-view]");
  if (btn && btn.dataset.view !== "inbox") startRename(btn.dataset.view);
});

document.getElementById("itemlist").addEventListener("click", (e) => {
  const row = e.target.closest(".item"); if (!row) return;
  const act = e.target.closest("[data-act]")?.dataset.act;
  const id = row.dataset.id;
  if (act === "toggle") toggleDone(id);
  else if (act === "del") deleteItem(id);
  else if (act === "viewcat") go("list", S.items.find(i => i.id === id)?.cat || "all");
});

document.getElementById("pop").addEventListener("click", (e) => {
  const catId = document.getElementById("pop").dataset.cat;
  const act = e.target.closest("[data-pop]")?.dataset.pop;
  if (act === "rename") { closeMenu(); startRename(catId); }
  else if (act === "delete") { closeMenu(); deleteCat(catId); }
});
document.getElementById("pop").addEventListener("change", (e) => {
  if (e.target.dataset.pop === "merge" && e.target.value) {
    mergeCat(document.getElementById("pop").dataset.cat, e.target.value);
    closeMenu();
  }
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#pop") && !e.target.closest("[data-menu]")) closeMenu();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeMenu(); settings.classList.remove("open"); }
});

/* settings */
const settings = document.getElementById("settings");
document.getElementById("open-settings").addEventListener("click", () => {
  document.getElementById("apikey").value = S.apiKey || "";
  settings.classList.add("open");
});
document.getElementById("settings-close").addEventListener("click", () => settings.classList.remove("open"));
document.getElementById("settings-save").addEventListener("click", () => {
  S.apiKey = document.getElementById("apikey").value.trim();
  save(); settings.classList.remove("open");
});
settings.addEventListener("click", (e) => { if (e.target === settings) settings.classList.remove("open"); });

render();
</script>
</body>
</html>
